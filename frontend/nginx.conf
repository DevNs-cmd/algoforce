server {
    listen 80;
    server_name algoforceaii.com;
    return 301 https://www.algoforceaii.com$request_uri;
}

server {
    listen 80;
    server_name www.algoforceaii.com;
    return 301 https://www.algoforceaii.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.algoforceaii.com;

    # ssl_certificate /etc/ssl/certs/algoforceaii.crt;
    # ssl_certificate_key /etc/ssl/private/algoforceaii.key;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent bot 403s: do not block Googlebot/Bing/AI crawlers
    location = /robots.txt { try_files $uri =404; add_header Cache-Control "public, max-age=86400"; }
    location = /sitemap.xml { try_files $uri =404; add_header Cache-Control "public, max-age=86400"; }

    # Cache static assets hard, keep HTML soft
    location ~* \.(js|css|png|jpe?g|gif|webp|ico|svg|woff2?)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ /index.html;
    }

    location / {
        add_header Cache-Control "public, max-age=600";
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header Referrer-Policy strict-origin-when-cross-origin;
}
